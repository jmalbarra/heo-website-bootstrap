  <style>
    /* ── Store layout ── */
    .store-page {
      padding-top: 72px;
      min-height: 100vh;
    }

    .store-hero {
      padding: 64px 24px 48px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 48px;
    }

    .store-hero__eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--accent, #22eec9);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: block;
    }

    .store-hero__title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin: 0 0 10px;
    }

    .store-hero__sub {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.4);
      margin: 0;
    }

    /* ── Product grid ── */
    .store-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 120px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: #0d0d10;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 3px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
    }

    .product-card:hover {
      border-color: rgba(34,238,201,0.35);
      transform: translateY(-3px);
    }

    .product-card__image {
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #111115;
      position: relative;
      overflow: hidden;
    }

    .product-card__image::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 100%, var(--card-color, rgba(34,238,201,0.08)) 0%, transparent 65%);
      pointer-events: none;
    }

    .product-card__image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      padding: 8px;
      cursor: zoom-in;
      transition: transform 0.2s;
    }

    .product-card__image img:hover {
      transform: scale(1.04);
    }

    /* ── Lightbox ── */
    .lb-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .lb-overlay--open {
      opacity: 1;
      pointer-events: auto;
    }

    .lb-overlay img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    }

    .lb-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.55);
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      font-family: sans-serif;
      transition: color 0.18s;
      z-index: 1001;
    }

    .lb-close:hover { color: #fff; }

    .product-card__placeholder-icon {
      width: 48px;
      height: 48px;
      opacity: 0.18;
    }

    .product-card__placeholder-label {
      font-family: 'Geist Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      text-align: center;
      padding: 0 12px;
    }

    .product-card__body {
      padding: 16px 16px 14px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .product-card__cat {
      font-family: 'Geist Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--card-color, #22eec9);
      margin: 0 0 6px;
    }

    .product-card__name {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fff;
      text-transform: uppercase;
      margin: 0 0 14px;
      flex: 1;
    }

    .product-card__add {
      width: 100%;
      padding: 9px 12px;
      background: transparent;
      border: 1px solid rgba(34,238,201,0.45);
      color: #22eec9;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }

    .product-card__add:hover {
      background: #22eec9;
      color: #050507;
      border-color: #22eec9;
    }

    /* ── Cart FAB ── */
    .cart-fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 58px;
      height: 58px;
      background: #22eec9;
      border: none;
      border-radius: 50%;
      color: #050507;
      cursor: pointer;
      z-index: 150;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(34,238,201,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .cart-fab:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 32px rgba(34,238,201,0.65);
    }

    .cart-fab__badge {
      position: absolute;
      top: -3px;
      right: -3px;
      background: #ff3b3b;
      color: #fff;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      border: 2px solid #050507;
    }

    .cart-fab__badge--on { display: flex; }

    /* ── Cart overlay ── */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s;
      backdrop-filter: blur(2px);
    }

    .cart-overlay--open {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Cart panel ── */
    .cart-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 380px;
      max-width: 100vw;
      height: 100vh;
      background: #0a0a0d;
      border-left: 1px solid rgba(34,238,201,0.18);
      z-index: 300;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .cart-panel--open { transform: translateX(0); }

    .cart-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .cart-panel__title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #22eec9;
    }

    .cart-panel__close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
      transition: color 0.18s;
      font-family: sans-serif;
    }

    .cart-panel__close:hover { color: #fff; }

    .cart-panel__body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 24px;
    }

    .cart-panel__body::-webkit-scrollbar { width: 4px; }
    .cart-panel__body::-webkit-scrollbar-track { background: transparent; }
    .cart-panel__body::-webkit-scrollbar-thumb { background: rgba(34,238,201,0.25); border-radius: 2px; }

    .cart-empty {
      text-align: center;
      color: rgba(255,255,255,0.28);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      line-height: 1.7;
      padding: 48px 0;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .cart-item__thumb {
      width: 48px;
      height: 48px;
      object-fit: contain;
      background: #111115;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .cart-item__name {
      flex: 1;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
      color: #e0e0e0;
    }

    .cart-item__controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cart-item__btn {
      width: 26px;
      height: 26px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-family: sans-serif;
    }

    .cart-item__btn:hover {
      background: rgba(34,238,201,0.2);
      color: #22eec9;
      border-color: rgba(34,238,201,0.4);
    }

    .cart-item__qty {
      min-width: 22px;
      text-align: center;
      font-family: 'Geist Mono', monospace;
      font-size: 0.85rem;
      color: #fff;
    }

    .cart-item__remove {
      background: none;
      border: none;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
      transition: color 0.18s;
      font-family: sans-serif;
      line-height: 1;
    }

    .cart-item__remove:hover { color: #ff4444; }

    .cart-panel__footer {
      padding: 16px 24px calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .cart-note {
      font-family: 'Geist Mono', monospace;
      font-size: 0.62rem;
      color: rgba(255,255,255,0.25);
      text-align: center;
      margin: 0 0 12px;
      letter-spacing: 0.05em;
    }

    .btn-whatsapp {
      width: 100%;
      padding: 14px 16px;
      background: #25D366;
      border: none;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s;
    }

    .btn-whatsapp:hover { background: #1ebe5b; }

    .btn-whatsapp:disabled {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.25);
      cursor: default;
    }

    @media (max-width: 480px) {
      .cart-panel {
        width: 100vw;
        height: 85vh;
        top: auto;
        bottom: 0;
        right: 0;
        border-left: none;
        border-top: 1px solid rgba(34,238,201,0.18);
        border-radius: 12px 12px 0 0;
        transform: translateY(100%);
      }
      .cart-panel--open { transform: translateY(0); }
    }
  </style>
</head>

      { id: 'remera-baby-tee-cev-a06',   name: 'REMERA-BABY-TEE_CeV_A06',   cat: 'Cae el Velo', img: '../images/merch/REMERA-BABY-TEE_CeV_A06.png' },
      { id: 'remera-oversize-a01',       name: 'REMERA-OVERSIZE_A01',       cat: 'Clásico',     img: '../images/merch/REMERA-OVERSIZE_A01.png' },
      { id: 'remera-oversize-a02',       name: 'REMERA-OVERSIZE_A02',       cat: 'Clásico',     img: '../images/merch/REMERA-OVERSIZE_A02.png' },
      { id: 'remera-oversize-cev-b01',   name: 'REMERA-OVERSIZE_CeV_B01',   cat: 'Cae el Velo', img: '../images/merch/REMERA-OVERSIZE_CeV_B01.png' },
    ];

    var CAT_COLORS = {
      'Clásico':     '#22eec9',
      'Cae el Velo': '#b44fff',
    };

    var cart = [];

    /* ── Cart helpers ── */
    function cartTotal() {
      return cart.reduce(function (s, i) { return s + i.qty; }, 0);
    }

    function addToCart(id, name, img) {
      var existing = cart.find(function (i) { return i.id === id; });
      if (existing) { existing.qty++; }
      else { cart.push({ id: id, name: name, img: img || '', qty: 1 }); }
      refreshUI();
      flashAdded(id);
    }

    function changeQty(id, delta) {
      var item = cart.find(function (i) { return i.id === id; });
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) { cart = cart.filter(function (i) { return i.id !== id; }); }
      refreshUI();
    }

    function removeItem(id) {
      cart = cart.filter(function (i) { return i.id !== id; });
      refreshUI();
    }

    /* ── UI refresh ── */
    function refreshUI() {
      var total = cartTotal();
      var badge = document.getElementById('cart-badge');
      badge.textContent = total;
      badge.classList.toggle('cart-fab__badge--on', total > 0);
      renderCartBody();
    }

    function renderCartBody() {
      var body = document.getElementById('cart-body');
      var btn  = document.getElementById('checkout-btn');
      if (cart.length === 0) {
        body.innerHTML = '<p class="cart-empty">Todavía no agregaste nada.<br>Explorá el catálogo arriba.</p>';
        btn.disabled = true;
        return;
      }
      btn.disabled = false;
      body.innerHTML = cart.map(function (item) {
        return '<div class="cart-item">' +
          (item.img ? '<img class="cart-item__thumb" src="' + item.img + '" alt="' + item.name + '" loading="lazy">' : '') +
          '<span class="cart-item__name">' + item.name + '</span>' +
          '<div class="cart-item__controls">' +
            '<button class="cart-item__btn" data-action="dec" data-id="' + item.id + '" aria-label="Restar uno">−</button>' +
            '<span class="cart-item__qty">' + item.qty + '</span>' +
            '<button class="cart-item__btn" data-action="inc" data-id="' + item.id + '" aria-label="Sumar uno">+</button>' +
          '</div>' +
          '<button class="cart-item__remove" data-action="del" data-id="' + item.id + '" aria-label="Eliminar">×</button>' +
        '</div>';
      }).join('');
    }

    function flashAdded(id) {
      var btn = document.querySelector('[data-product-id="' + id + '"] .product-card__add');
      if (!btn) return;
      btn.textContent = '✓ Agregado';
      btn.style.background = '#22eec9';
      btn.style.color = '#050507';
      setTimeout(function () {
        btn.textContent = '+ Agregar al carrito';
        btn.style.background = '';
        btn.style.color = '';
      }, 1300);
    }

    /* ── Cart open/close ── */
    function openCart() {
      document.getElementById('cart-panel').classList.add('cart-panel--open');
      document.getElementById('cart-panel').setAttribute('aria-hidden', 'false');
      document.getElementById('cart-overlay').classList.add('cart-overlay--open');
      document.getElementById('cart-overlay').setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeCart() {
      document.getElementById('cart-panel').classList.remove('cart-panel--open');
      document.getElementById('cart-panel').setAttribute('aria-hidden', 'true');
      document.getElementById('cart-overlay').classList.remove('cart-overlay--open');
      document.getElementById('cart-overlay').setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    /* ── Checkout ── */
    function checkout() {
      if (cart.length === 0) return;
      var lines = cart.map(function (i) { return '• ' + i.qty + 'x ' + i.name; }).join('\n');
      var msg = 'Hola Nelo! Quiero comprar:\n' + lines + '\n\n¿Me podés asesorar?';
      window.open('https://wa.me/' + PHONE + '?text=' + encodeURIComponent(msg), '_blank');
    }

    /* ── Render products ── */
    function renderProducts() {
      var grid = document.getElementById('product-grid');
      grid.innerHTML = PRODUCTS.map(function (p) {
        var catColor  = CAT_COLORS[p.cat] || '#22eec9';
        var cardColor = p.cat === 'Cae el Velo' ? 'rgba(180,79,255,0.12)' : 'rgba(34,238,201,0.12)';
        return '<div class="product-card" data-product-id="' + p.id + '" style="--card-color:' + cardColor + '">' +
          '<div class="product-card__image">' +
            '<img src="' + p.img + '" alt="' + p.name + '" loading="lazy">' +
          '</div>' +
          '<div class="product-card__body">' +
            (p.cat !== 'Clásico' ? '<p class="product-card__cat" style="color:' + catColor + '">' + p.cat + '</p>' : '') +
            '<h3 class="product-card__name">' + p.name + '</h3>' +
            '<button class="product-card__add" data-id="' + p.id + '" data-name="' + p.name + '" data-img="' + p.img + '">+ Agregar al carrito</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    /* ── Event delegation ── */
    document.addEventListener('DOMContentLoaded', function () {
      renderProducts();
      renderCartBody();

      document.getElementById('cart-fab').addEventListener('click', openCart);
      document.getElementById('cart-close').addEventListener('click', closeCart);
      document.getElementById('cart-overlay').addEventListener('click', closeCart);
      document.getElementById('checkout-btn').addEventListener('click', checkout);

      /* Product grid: add to cart */
      document.getElementById('product-grid').addEventListener('click', function (e) {
        var btn = e.target.closest('.product-card__add');
        if (!btn) return;
        addToCart(btn.dataset.id, btn.dataset.name, btn.dataset.img);
      });

      /* Cart body: qty controls + remove */
      document.getElementById('cart-body').addEventListener('click', function (e) {
        var btn = e.target.closest('[data-action]');
        if (!btn) return;
        var action = btn.dataset.action;
        var id     = btn.dataset.id;
        if (action === 'inc') changeQty(id, 1);
        if (action === 'dec') changeQty(id, -1);
        if (action === 'del') removeItem(id);
      });

      /* Lightbox */
      var lbOverlay = document.getElementById('lb-overlay');
      var lbImg     = document.getElementById('lb-img');

      function openLightbox(src, alt) {
        lbImg.src = src;
        lbImg.alt = alt;
        lbOverlay.classList.add('lb-overlay--open');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lbOverlay.classList.remove('lb-overlay--open');
        document.body.style.overflow = '';
        lbImg.src = '';
      }

      document.getElementById('lb-close').addEventListener('click', closeLightbox);
      lbOverlay.addEventListener('click', function (e) {
        if (e.target === lbOverlay) closeLightbox();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeLightbox();
      });

      document.getElementById('product-grid').addEventListener('click', function (e) {
        var img = e.target.closest('.product-card__image img');
        if (!img) return;
        openLightbox(img.src, img.alt);
      });
    });
  })();
  </script>

</body>
</html>
