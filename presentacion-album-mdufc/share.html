<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
	<meta http-equiv="Pragma" content="no-cache">
	<title>Tu foto — Mitos de un futuro cercano · Hacia el Ocaso</title>
	<meta name="description" content="Creá una imagen con glitch, colores del disco y marcas para compartir en redes.">
	<link rel="icon" href="../images/favicon.ico" type="image/x-icon">
	<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/live.css?v=6">
	<link rel="stylesheet" href="css/share.css?v=7">
</head>
<body class="share-page">
	<div id="matrix-bg" aria-hidden="true">
		<canvas id="matrix-canvas"></canvas>
		<div id="matrix-overlay"></div>
	</div>
	<div class="app-wrap">
		<div class="brand-mark">
			<img src="../images/ojo-goth-blanco.png" alt="" class="brand-mark__img" width="72" height="72" decoding="async" role="presentation">
		</div>
		<header class="share-intro">
			<p class="kicker">Compartí</p>
			<h1>Tu foto con el vibe del disco</h1>
			<p class="sub">Subí una imagen: le sumamos color tapa y los FX que quieras. Listo para publicar.</p>
		</header>
		<div class="panel share-panel">
			<label class="share-dropzone">
				<span class="share-dropzone__label">Elegir foto</span>
				<span class="share-dropzone__hint">JPG o PNG · se procesa en tu celular o PC, no la subimos a ningún servidor</span>
				<input type="file" id="share-file" accept="image/*">
			</label>
			<div id="share-preview-wrap" class="share-preview-wrap hidden">
				<div class="share-canvas-frame">
					<canvas id="share-canvas" width="1080" height="1350" aria-label="Vista previa de tu imagen"></canvas>
				</div>
				<div class="fx-panel">
					<span class="fx-panel__label">FX</span>
					<div class="fx-pills">
						<button type="button" class="fx-pill is-active" data-fx="glitch">Glitch</button>
						<button type="button" class="fx-pill is-active" data-fx="vignette">Viñeta</button>
						<button type="button" class="fx-pill" data-fx="chroma">Chroma</button>
						<button type="button" class="fx-pill" data-fx="particles">Partículas</button>
					</div>
				</div>
				<div class="share-actions">
					<button type="button" class="btn" id="btn-shuffle">Otro glitch</button>
					<button type="button" class="btn btn-primary-solid" id="btn-download">Descargar PNG</button>
				</div>
				<p class="share-footer-note">
					Instagram:
					<a id="share-ig-link" href="https://www.instagram.com/heo.oficial/" target="_blank" rel="noopener noreferrer">@heo.oficial</a>
				</p>
			</div>
		</div>
		<a class="share-back" href="index.html">← Volver al show</a>
	</div>
	<script>
	(function () {
		var bust = "_=" + Date.now();
		function loadScript(src, onload) {
			var s = document.createElement("script");
			s.src = src + (src.indexOf("?") >= 0 ? "&" : "?") + bust;
			s.async = false;
			if (onload) s.onload = onload;
			s.onerror = onload || function () {};
			document.body.appendChild(s);
		}
		loadScript("js/matrix-bg.js", function () {
			loadScript("js/share-photo.js");
		});
	})();
	</script>
</body>
</html>
